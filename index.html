<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightfall Geographer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #000 100%);
            color: #eee;
        }
        body {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 560px;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 8px;
            color: #FFEB3B;
            letter-spacing: 0.02em;
        }
        p.tagline {
            color: #aaa;
            margin: 0 0 32px;
            font-size: 1rem;
        }

        .region-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 32px;
        }
        .region-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30, 30, 45, 0.85);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 14px 16px;
            transition: border-color 0.15s, background 0.15s;
        }
        .region-row:hover { border-color: #FF9800; background: rgba(40, 40, 55, 0.95); }
        .region-name {
            flex: 1;
            text-align: left;
            font-size: 1.05rem;
            font-weight: 600;
            color: #FF9800;
        }
        .region-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .region-btn {
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
        }
        .region-btn.play {
            background: #4CAF50;
            color: #fff;
        }
        .region-btn.play:hover { background: #45a049; }
        .region-btn.study {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
        }
        .region-btn.study:hover { border-color: #FF9800; color: #FF9800; }

        @media (max-width: 420px) {
            .region-name { font-size: 0.95rem; }
            .region-btn { padding: 6px 10px; font-size: 0.8rem; }
        }

        footer {
            font-size: 0.78rem;
            color: #666;
        }
        footer a { color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nightfall Geographer</h1>
        <p class="tagline">Identify cities from their nighttime lights.</p>

        <div class="region-list">
            <div class="region-row">
                <span class="region-name">North America</span>
                <span class="region-actions">
                    <a class="region-btn play" href="game.html?region=na">Play</a>
                    <a class="region-btn study" href="study.html?region=na">Study</a>
                </span>
            </div>
            <div class="region-row">
                <span class="region-name">Europe</span>
                <span class="region-actions">
                    <a class="region-btn play" href="game.html?region=eu">Play</a>
                    <a class="region-btn study" href="study.html?region=eu">Study</a>
                </span>
            </div>
            <div class="region-row">
                <span class="region-name">South America</span>
                <span class="region-actions">
                    <a class="region-btn play" href="game.html?region=sa">Play</a>
                    <a class="region-btn study" href="study.html?region=sa">Study</a>
                </span>
            </div>
            <div class="region-row">
                <span class="region-name">Africa</span>
                <span class="region-actions">
                    <a class="region-btn play" href="game.html?region=af">Play</a>
                    <a class="region-btn study" href="study.html?region=af">Study</a>
                </span>
            </div>
            <div class="region-row">
                <span class="region-name">Asia</span>
                <span class="region-actions">
                    <a class="region-btn play" href="game.html?region=as">Play</a>
                    <a class="region-btn study" href="study.html?region=as">Study</a>
                </span>
            </div>
            <div class="region-row">
                <span class="region-name">Oceania</span>
                <span class="region-actions">
                    <a class="region-btn play" href="game.html?region=oc">Play</a>
                    <a class="region-btn study" href="study.html?region=oc">Study</a>
                </span>
            </div>
        </div>

        <footer>
            Imagery: NASA GIBS &middot; Esri &middot; <a href="https://github.com/cobiadigital/night_time_geoguesser">Source on GitHub</a>
        </footer>
    </div>
</body>
</html>
